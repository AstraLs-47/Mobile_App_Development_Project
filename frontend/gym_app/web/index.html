<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="gym_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>gym_app</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    (async function () {
      if ('serviceWorker' in navigator) {
        try {
          const registrations = await navigator.serviceWorker.getRegistrations();
          for (const registration of registrations) {
            if (registration.active && registration.active.scriptURL.includes('sqflite_sw.js')) {
              await registration.unregister();
              console.log('[sqflite_sw] Unregistered incorrect sqflite_sw.js service worker.');
            }
          }
        } catch (err) {
          console.warn('[sqflite_sw] Failed to check or unregister incorrect service workers:', err);
        }
      }

      // Load and start Flutter normally. sqflite_common_ffi_web will spawn
      // sqflite_sw.js as a Shared/Dedicated worker internally.
      var flutterScript = document.createElement('script');
      flutterScript.src = 'flutter_bootstrap.js';
      document.body.appendChild(flutterScript);
    })();
  </script>
</body>
</html>
