name: gym_app
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  
  # Navigation
  go_router: ^14.2.0
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Date formatting
  intl: ^0.19.0
  
  # Charts/Graphs
  fl_chart: ^0.70.0
  
  # Image picking
  image_picker: ^1.1.2
  
  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  import_sorter: ^4.6.0  # Moved here - this belongs in dev_dependencies

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  
  assets:
    - assets/